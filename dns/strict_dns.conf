# 严格 DNS 配置
# 单一 DoH 源，最大程度保证解析一致性
#
# 用法: 直接复制到主配置 [General] 段的 dns-server 字段

dns-server = https://doh.pub/dns-query

# 说明:
#   仅使用单一 DNS 源，避免多源解析结果不一致
#
# 为什么单源更安全:
#   - 多 DNS 源可能返回不同 IP
#   - 不同 IP 可能分布在不同区域
#   - 区域差异会导致出口策略不同
#   - 在高风控场景下，这种不一致可能触发风控
#
# 适用场景:
#   - 登录高价值账号前
#   - 怀疑 DNS 导致出口异常时
#   - 搭配 strict.conf 使用
